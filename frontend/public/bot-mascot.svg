<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 432 390" width="432" height="390" shape-rendering="crispEdges">
  <defs>
    <style>
      .g{fill:#FFD700}.b3{fill:#64B5F6}.b2{fill:#1565C0}.b1{fill:#003F87}.p{fill:#4B0082}.d{fill:#0A1628}
      .w{fill:#E0E0E0}

      /* ---- ANTENNA PULSE ---- */
      @keyframes antennaPulse {
        0%,100%{opacity:1} 50%{opacity:0.3}
      }
      .antenna-blink { animation: antennaPulse 2s ease-in-out infinite }

      /* ---- BLINK (lampeggio neutro) ---- */
      @keyframes blink {
        0%,45%,55%,100%{opacity:1} 50%{opacity:0}
      }
      .eye-blink { animation: blink 5s ease-in-out infinite }

      /* ---- GLITCH FLICKER (transizioni) ---- */
      @keyframes glitch1 {
        0%,20%,100%{opacity:0} 21%,25%{opacity:1} 26%,28%{opacity:0} 29%,30%{opacity:0.6}
      }
      @keyframes glitch2 {
        0%,40%,100%{opacity:0} 41%,44%{opacity:0.8} 45%,47%{opacity:0} 48%,50%{opacity:0.4}
      }
      @keyframes glitch3 {
        0%,60%,100%{opacity:0} 61%,63%{opacity:0.7} 64%,66%{opacity:0} 67%,70%{opacity:0.5}
      }
      .glitch-a { animation: glitch1 12s infinite }
      .glitch-b { animation: glitch2 12s infinite }
      .glitch-c { animation: glitch3 12s infinite }

      /* ---- EXPRESSION CYCLE ---- */
      /* Neutro visibile: 0s-3.3s e 10.8s-12s */
      @keyframes showNeutral {
        0%,25%{opacity:1} 27.5%,88%{opacity:0} 90%,100%{opacity:1}
      }
      .expr-neutral { animation: showNeutral 12s linear infinite }

      /* Happy visibile: 3.6s-6.9s */
      @keyframes showHappy {
        0%,28%{opacity:0} 30%,55%{opacity:1} 57.5%,100%{opacity:0}
      }
      .expr-happy { animation: showHappy 12s linear infinite }

      /* Thinking visibile: 7.2s-10.5s */
      @keyframes showThinking {
        0%,58%{opacity:0} 60%,85%{opacity:1} 87.5%,100%{opacity:0}
      }
      .expr-thinking { animation: showThinking 12s linear infinite }

      /* ---- OCCHI MORPH: da 2x2 a ^ ^ ---- */
      /* Pixel occhi neutrali che scompaiono per far posto a happy */
      @keyframes neutralInner {
        0%,22%{opacity:1} 25%,92%{opacity:0} 94%,100%{opacity:1}
      }
      .ni { animation: neutralInner 12s linear infinite }

      /* ---- HAPPY PIXEL BUILD (appaiono con stagger) ---- */
      @keyframes happyLeftTip  { 0%,27%{opacity:0} 30%,32%{opacity:1} 55%,100%{opacity:0} }
      @keyframes happyLeftBase { 0%,29%{opacity:0} 31%,33%{opacity:1} 55%,100%{opacity:0} }
      @keyframes happyRightTip  { 0%,28%{opacity:0} 31%,33%{opacity:1} 55%,100%{opacity:0} }
      @keyframes happyRightBase { 0%,30%{opacity:0} 32%,34%{opacity:1} 55%,100%{opacity:0} }
      .hlt{animation:happyLeftTip 12s linear infinite}
      .hlb{animation:happyLeftBase 12s linear infinite}
      .hrt{animation:happyRightTip 12s linear infinite}
      .hrb{animation:happyRightBase 12s linear infinite}

      /* ---- THINKING BUILD ---- */
      @keyframes thinkEyeL { 0%,57%{opacity:0} 60%,62%{opacity:1} 85%,100%{opacity:0} }
      @keyframes thinkEyeR { 0%,58%{opacity:0} 61%,63%{opacity:1} 85%,100%{opacity:0} }
      @keyframes thinkMouth { 0%,59%{opacity:0} 62%,64%{opacity:1} 85%,100%{opacity:0} }
      .tel{animation:thinkEyeL 12s linear infinite}
      .ter{animation:thinkEyeR 12s linear infinite}
      .tmo{animation:thinkMouth 12s linear infinite}

      /* ---- GLITCH SCREEN PIXELS ---- */
      @keyframes gpx1 { 0%,22%{opacity:0} 23%{opacity:0.7} 24%{opacity:0.3} 25%{opacity:0}
                         52%{opacity:0} 53%{opacity:0.6} 54%{opacity:0} 
                         82%{opacity:0} 83%{opacity:0.5} 84%{opacity:0.8} 85%{opacity:0}
                         100%{opacity:0} }
      @keyframes gpx2 { 0%,23%{opacity:0} 24%{opacity:0.4} 25%{opacity:0.8} 26%{opacity:0}
                         52%{opacity:0} 54%{opacity:0.7} 55%{opacity:0}
                         84%{opacity:0} 85%{opacity:0.6} 86%{opacity:0}
                         100%{opacity:0} }
      @keyframes gpx3 { 0%,22%{opacity:0} 24%{opacity:0.9} 25%{opacity:0.3} 26.5%{opacity:0}
                         53%{opacity:0} 55%{opacity:0.5} 56%{opacity:0}
                         83%{opacity:0} 84%{opacity:0.8} 85.5%{opacity:0}
                         100%{opacity:0} }
      .gp1{animation:gpx1 12s linear infinite}
      .gp2{animation:gpx2 12s linear infinite}
      .gp3{animation:gpx3 12s linear infinite}
    </style>
  </defs>

  <!-- ===== ANTENNA ===== -->
  <rect x="192" y="0" width="24" height="24" class="g antenna-blink"/>
  <rect x="216" y="0" width="24" height="24" class="g antenna-blink"/>
  <rect x="192" y="24" width="24" height="24" class="g antenna-blink"/>
  <rect x="216" y="24" width="24" height="24" class="g antenna-blink"/>

  <!-- ===== HEAD OUTLINE (static) ===== -->
  <rect x="120" y="48" width="24" height="24" class="b3"/><rect x="144" y="48" width="24" height="24" class="b2"/><rect x="168" y="48" width="24" height="24" class="b2"/><rect x="192" y="48" width="24" height="24" class="b2"/><rect x="216" y="48" width="24" height="24" class="b2"/><rect x="240" y="48" width="24" height="24" class="b2"/><rect x="264" y="48" width="24" height="24" class="b2"/><rect x="288" y="48" width="24" height="24" class="b3"/>
  <rect x="96" y="72" width="24" height="24" class="b3"/><rect x="120" y="72" width="24" height="24" class="b2"/><rect x="144" y="72" width="24" height="24" class="b2"/><rect x="168" y="72" width="24" height="24" class="b2"/><rect x="192" y="72" width="24" height="24" class="b2"/><rect x="216" y="72" width="24" height="24" class="b2"/><rect x="240" y="72" width="24" height="24" class="b2"/><rect x="264" y="72" width="24" height="24" class="b2"/><rect x="288" y="72" width="24" height="24" class="b2"/><rect x="312" y="72" width="24" height="24" class="b3"/>
  <rect x="72" y="96" width="24" height="24" class="b2"/><rect x="96" y="96" width="24" height="24" class="b1"/><rect x="120" y="96" width="24" height="24" class="b1"/><rect x="144" y="96" width="24" height="24" class="b1"/><rect x="168" y="96" width="24" height="24" class="b1"/><rect x="192" y="96" width="24" height="24" class="b1"/><rect x="216" y="96" width="24" height="24" class="b1"/><rect x="240" y="96" width="24" height="24" class="b1"/><rect x="264" y="96" width="24" height="24" class="b1"/><rect x="288" y="96" width="24" height="24" class="b1"/><rect x="312" y="96" width="24" height="24" class="b1"/><rect x="336" y="96" width="24" height="24" class="b2"/>
  <rect x="48" y="144" width="24" height="24" class="b3"/><rect x="360" y="144" width="24" height="24" class="b3"/>
  <rect x="48" y="168" width="24" height="24" class="b3"/><rect x="360" y="168" width="24" height="24" class="b3"/>
  <rect x="48" y="192" width="24" height="24" class="b3"/><rect x="360" y="192" width="24" height="24" class="b3"/>
  <rect x="48" y="216" width="24" height="24" class="b3"/><rect x="360" y="216" width="24" height="24" class="b3"/>
  <!-- Screen borders -->
  <rect x="72" y="120" width="24" height="24" class="b2"/><rect x="96" y="120" width="24" height="24" class="b1"/><rect x="312" y="120" width="24" height="24" class="b1"/><rect x="336" y="120" width="24" height="24" class="b2"/>
  <rect x="72" y="144" width="24" height="24" class="b2"/><rect x="96" y="144" width="24" height="24" class="b1"/><rect x="312" y="144" width="24" height="24" class="b1"/><rect x="336" y="144" width="24" height="24" class="b2"/>
  <rect x="72" y="168" width="24" height="24" class="b2"/><rect x="96" y="168" width="24" height="24" class="b1"/><rect x="312" y="168" width="24" height="24" class="b1"/><rect x="336" y="168" width="24" height="24" class="b2"/>
  <rect x="72" y="192" width="24" height="24" class="b2"/><rect x="96" y="192" width="24" height="24" class="b1"/><rect x="312" y="192" width="24" height="24" class="b1"/><rect x="336" y="192" width="24" height="24" class="b2"/>
  <rect x="72" y="216" width="24" height="24" class="b2"/><rect x="96" y="216" width="24" height="24" class="b1"/><rect x="312" y="216" width="24" height="24" class="b1"/><rect x="336" y="216" width="24" height="24" class="b2"/>
  <rect x="72" y="240" width="24" height="24" class="b2"/><rect x="96" y="240" width="24" height="24" class="b1"/><rect x="312" y="240" width="24" height="24" class="b1"/><rect x="336" y="240" width="24" height="24" class="b2"/>

  <!-- ===== SCHERMO DI BASE ===== -->
  <rect x="120" y="120" width="192" height="120" class="d"/>

  <!-- ===== GLITCH OVERLAY (pixel casuali che lampeggiano durante le transizioni) ===== -->
  <rect x="144" y="144" width="24" height="24" class="p gp1"/><rect x="192" y="168" width="24" height="24" class="b3 gp2"/>
  <rect x="240" y="120" width="24" height="24" class="w gp3"/><rect x="168" y="192" width="24" height="24" class="b3 gp1"/>
  <rect x="216" y="144" width="24" height="24" class="p gp2"/><rect x="264" y="216" width="24" height="24" class="w gp3"/>
  <rect x="144" y="216" width="24" height="24" class="b3 gp1"/><rect x="192" y="120" width="24" height="24" class="p gp2"/>
  <rect x="288" y="168" width="24" height="24" class="w gp3"/><rect x="168" y="144" width="24" height="24" class="b3 gp3"/>
  <rect x="240" y="192" width="24" height="24" class="p gp2"/><rect x="120" y="192" width="24" height="24" class="w gp1"/>

  <!-- ===== ESPRESSIONE 1: NEUTRO (2x2 eyes, no mouth) ===== -->
  <g class="expr-neutral">
    <!-- Left eye 2x2 -->
    <rect x="144" y="144" width="24" height="24" class="p eye-blink"/>
    <rect x="168" y="144" width="24" height="24" class="p eye-blink ni"/>
    <rect x="144" y="168" width="24" height="24" class="p eye-blink ni"/>
    <rect x="168" y="168" width="24" height="24" class="p eye-blink ni"/>
    <!-- Right eye 2x2 -->
    <rect x="240" y="144" width="24" height="24" class="p eye-blink ni"/>
    <rect x="264" y="144" width="24" height="24" class="p eye-blink"/>
    <rect x="240" y="168" width="24" height="24" class="p eye-blink ni"/>
    <rect x="264" y="168" width="24" height="24" class="p eye-blink ni"/>
  </g>

  <!-- ===== ESPRESSIONE 2: HAPPY (^ ^ eyes, no mouth) ===== -->
  <g class="expr-happy">
    <!-- Left ^ : tip + base -->
    <rect x="144" y="144" width="24" height="24" class="p hlt"/>
    <rect x="120" y="168" width="24" height="24" class="p hlb"/>
    <rect x="168" y="168" width="24" height="24" class="p hlb"/>
    <!-- Right ^ : tip + base -->
    <rect x="264" y="144" width="24" height="24" class="p hrt"/>
    <rect x="240" y="168" width="24" height="24" class="p hrb"/>
    <rect x="288" y="168" width="24" height="24" class="p hrb"/>
  </g>

  <!-- ===== ESPRESSIONE 3: THINKING (1px eyes + mouth) ===== -->
  <g class="expr-thinking">
    <!-- Eyes: 1 pixel each at row 168 -->
    <rect x="144" y="168" width="24" height="24" class="p tel"/>
    <rect x="264" y="168" width="24" height="24" class="p ter"/>
    <!-- Mouth -->
    <rect x="192" y="216" width="24" height="24" class="p tmo"/>
  </g>

  <!-- ===== CHIN (static) ===== -->
  <rect x="72" y="264" width="24" height="24" class="b2"/><rect x="96" y="264" width="24" height="24" class="b1"/><rect x="120" y="264" width="24" height="24" class="b1"/><rect x="144" y="264" width="24" height="24" class="b1"/><rect x="168" y="264" width="24" height="24" class="b1"/><rect x="192" y="264" width="24" height="24" class="b1"/><rect x="216" y="264" width="24" height="24" class="b1"/><rect x="240" y="264" width="24" height="24" class="b1"/><rect x="264" y="264" width="24" height="24" class="b1"/><rect x="288" y="264" width="24" height="24" class="b1"/><rect x="312" y="264" width="24" height="24" class="b1"/><rect x="336" y="264" width="24" height="24" class="b2"/>
  <rect x="96" y="288" width="24" height="24" class="b3"/><rect x="120" y="288" width="24" height="24" class="b2"/><rect x="144" y="288" width="24" height="24" class="b2"/><rect x="168" y="288" width="24" height="24" class="b2"/><rect x="192" y="288" width="24" height="24" class="b2"/><rect x="216" y="288" width="24" height="24" class="b2"/><rect x="240" y="288" width="24" height="24" class="b2"/><rect x="264" y="288" width="24" height="24" class="b2"/><rect x="288" y="288" width="24" height="24" class="b2"/><rect x="312" y="288" width="24" height="24" class="b3"/>
  <rect x="120" y="312" width="24" height="24" class="b3"/><rect x="144" y="312" width="24" height="24" class="b2"/><rect x="168" y="312" width="24" height="24" class="b2"/><rect x="192" y="312" width="24" height="24" class="b2"/><rect x="216" y="312" width="24" height="24" class="b2"/><rect x="240" y="312" width="24" height="24" class="b2"/><rect x="264" y="312" width="24" height="24" class="b2"/><rect x="288" y="312" width="24" height="24" class="b3"/>

  <!-- Timeline overlay (debug, nascosto) -->
  <!--
  <text x="216" y="380" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#64B5F6" opacity="0.3">
    Cycle: Neutral(0-3.3s) → Glitch → Happy(3.6-6.9s) → Glitch → Thinking(7.2-10.5s) → Glitch → Neutral(10.8s+)
  </text>
  -->
</svg>
